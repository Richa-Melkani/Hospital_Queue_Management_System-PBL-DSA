<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hospital Queue Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                🏥 Hospital Queue
            </a>

            <div>

                <a href="/" class="btn btn-light btn-sm me-2">
                    Home
                </a>

                <a href="/add_patient" class="btn btn-light btn-sm me-2">
                    Add Patient
                </a>

                <a href="/queue" class="btn btn-light btn-sm me-2">
                    Queue
                </a>

                <a href="/search" class="btn btn-light btn-sm me-2">
                    Search
                </a>

                <a href="/history" class="btn btn-light btn-sm">
                    History
                </a>

            </div>

        </div>

    </nav>

    <!-- Main Content -->
<div class="container mt-4">

    {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

            {% for category, message in messages %}

                <div class="alert alert-{{ category }} alert-dismissible fade show">

                    {{ message }}

                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="alert">
                    </button>

                </div>

            {% endfor %}

        {% endif %}

    {% endwith %}

    {% block content %}
    {% endblock %}

</div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
